<html>
    <head>
        <title>Dial Box</title>
        <style>
            #container{
                background-color:azure;
                border: 1px solid black;
                height:400px;
                width:400px;
                margin : 30px auto;
                border-radius:12px;

                display:flex;
                flex-direction:row;
                justify-content:space-evenly;
                flex-wrap:wrap;
                align-content:space-evenly;
                
            }
            .div1{
                height:100px;
                width:100px;
                /* margin:10px; */
                border:black solid 2px;
                border-radius:12px;
                font-size:50px;
                background-color:grey;
                text-align:center;
            }
            h1{
                text-align:center;
            }
        </style>
    </head>
    <body>
        <h1>FlexBox Dial Box</h1>
        <div id="container">
            <div class="div1">A</div>
            <div class="div1">B</div>
            <div class="div1">C</div>
            <div class="div1">D</div>
            <div class="div1">E</div>
            <div class="div1">F</div>
            <div class="div1">G</div>
            <div class="div1">H</div>
            <div class="div1">I</div>

        </div>
    </body>
</html>
