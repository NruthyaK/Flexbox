<html>
    <head>
        <title>Navigation</title>
        <style>
            #container{
                height:50px;
                width:900px;
                background-color:pink;
                border:rgb(47, 183, 47) 3px solid;
                border-radius:4px;

                display:flex;
                flex-direction:row;
                justify-content:flex-start;
                flex-wrap:wrap;
                align-content:space-between;
            }
            .child{
                height:50px;
                width:80px;
                margin:7px;
                font-size:24px;
            }

            h1{
                text-align:center;
            }
        </style>
    </head>
    <body>
        <h3>Navigation design using Flexbox</h3>

        <div id="container">
            <div class="child">logo</div>
            <div class="child">Home</div>
            <div class="child">About</div>
            <div class="child">Contact</div>
        </div>
    </body>
</html>
